<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- Google Meet - green video camera -->
  <rect x="4" y="10" width="21" height="20" rx="3" fill="#00897B"/>
  <polygon points="25,15 35,9 35,31 25,25" fill="#00897B"/>
  <!-- Green gradient tones -->
  <rect x="4" y="10" width="21" height="10" rx="3" fill="#00AC97" opacity="0.5"/>
  <!-- Camera lens indicator -->
  <circle cx="14" cy="20" r="4" fill="white" opacity="0.15"/>
  <!-- Grid lines suggesting video -->
  <line x1="14" y1="10" x2="14" y2="30" stroke="white" stroke-width="0.5" opacity="0.2"/>
  <line x1="4" y1="20" x2="25" y2="20" stroke="white" stroke-width="0.5" opacity="0.2"/>
</svg>
