<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- Power BI - yellow/amber bar chart -->
  <rect x="8" y="4" width="24" height="32" rx="3" fill="#F2C811"/>
  <!-- Three ascending bars -->
  <rect x="12" y="22" width="5" height="10" rx="1" fill="white"/>
  <rect x="19" y="16" width="5" height="16" rx="1" fill="white" opacity="0.9"/>
  <rect x="26" y="10" width="5" height="22" rx="1" fill="white" opacity="0.8"/>
  <!-- Bottom line -->
  <line x1="11" y1="33" x2="32" y2="33" stroke="white" stroke-width="1" opacity="0.5"/>
</svg>
